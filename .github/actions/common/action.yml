name: common
inputs:
  JYD_HOME:
    required: true
  MAKEFLAGS:
    required: true
  install-toolchain:
    required: true
    default: 'true'
runs:
  using: "composite"
  steps:
    - name: Download workbench
      uses: actions/download-artifact@v8
      with:
        name: workbench
        path: /tmp/artifact-download
    - name: Extract workbench
      shell: bash
      run: |
        PARENT=$(dirname ${{ inputs.JYD_HOME }})
        mkdir -p $PARENT
        cd $PARENT
        tar -xzf /tmp/artifact-download/ysyx-workbench.tar.gz

    - name: Cache oss-cad-suite
      id: oss-cad-suite-cache
      uses: actions/cache@v5
      with:
        path: oss-cad-suite
        key: ${{ runner.os }}-oss-cad-suite-${{ env.OSS_CAD_SUITE_RELEASE_TAG }}

    - name: Download oss-cad-suite
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      if: steps.oss-cad-suite-cache.outputs.cache-hit != 'true'
      run: |
        TAG=${{ env.OSS_CAD_SUITE_RELEASE_TAG }}
        echo "oss-cad-suite cache missed. Downloading and extracting release $TAG"
        ASSET_NAME=$(gh release view $TAG --repo YosysHQ/oss-cad-suite-build --json assets --jq ".assets[] | select(.name | contains(\"linux-x64\")) | .name")
        gh release download $TAG --repo YosysHQ/oss-cad-suite-build --pattern "$ASSET_NAME"
        tar xf $ASSET_NAME

    - name: Install Mill
      shell: bash
      run: |
        mkdir -p ~/.local/bin
        MILL_VERSION=0.11.13
        if [[ -e $JYD_HOME/npc/.mill-version ]]; then
          MILL_VERSION=`cat $JYD_HOME/npc/.mill-version`
        fi
        echo "Downloading mill with version $MILL_VERSION"
        curl -L "https://github.com/com-lihaoyi/mill/releases/download/$MILL_VERSION/$MILL_VERSION" -o ~/.local/bin/mill
        chmod +x ~/.local/bin/mill
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Set environment variables
      shell: bash
      run: |
        MONITOR_PY="$GITHUB_WORKSPACE/.github/monitor.py"
        echo "MONITOR_PY=$MONITOR_PY" >> $GITHUB_ENV

        JYD_HOME=${{ inputs.JYD_HOME }}
        echo "JYD_HOME=$JYD_HOME" >> $GITHUB_ENV
        echo "JYD_NEMU_HOME=$JYD_HOME/nemu" >> $GITHUB_ENV
        echo "JYD_AM_HOME=$JYD_HOME/abstract-machine" >> $GITHUB_ENV
        echo "AM_HOME=$JYD_HOME/abstract-machine" >> $GITHUB_ENV
        echo "NAVY_HOME=$JYD_HOME/navy-apps" >> $GITHUB_ENV
        echo "JYD_NPC_HOME=$JYD_HOME/npc" >> $GITHUB_ENV
        echo "NVBOARD_HOME=$JYD_HOME/nvboard" >> $GITHUB_ENV

        MAKEFLAGS=${{ inputs.MAKEFLAGS }}
        echo "MAKEFLAGS=$MAKEFLAGS" >> $GITHUB_ENV

        OSS_CAD_SUITE_BIN_PATH=`pwd`/oss-cad-suite/bin
        echo "PATH=$PATH:$OSS_CAD_SUITE_BIN_PATH" >> $GITHUB_ENV

      # TODO: 优化 apt 安装速度，缓存 /usr/bin 较为麻烦
      # 考虑安装到 workspace 目录下缓存，或者使用 docker 镜像等
    - name: Install RISC-V toolchain
      shell: bash
      if: inputs.install-toolchain == 'true'
      run: |
        sudo apt update
        sudo apt install -y g++-riscv64-linux-gnu llvm llvm-dev ruby ruby-bundler pipx
        sudo sed -i -e '8d' /usr/riscv64-linux-gnu/include/gnu/stubs.h

    - name: Cache Sail RISC-V model
      id: sail-riscv-cache
      if: inputs.install-toolchain == 'true'
      uses: actions/cache@v5
      with:
        path: sail-riscv-0.11
        key: ${{ runner.os }}-sail-riscv-0.11

    - name: Install Sail RISC-V model
      shell: bash
      if: inputs.install-toolchain == 'true'
      run: |
        SAIL_DIR="$GITHUB_WORKSPACE/sail-riscv-0.11"
        if [[ "${{ steps.sail-riscv-cache.outputs.cache-hit }}" != "true" ]]; then
          mkdir -p "$SAIL_DIR"
          curl -L "https://github.com/riscv/sail-riscv/releases/download/0.11/sail-riscv-Linux-x86_64.tar.gz" -o /tmp/sail-riscv-0.11.tar.gz
          tar xzf /tmp/sail-riscv-0.11.tar.gz --directory="$SAIL_DIR" --strip-components=1
        fi
        echo "$SAIL_DIR/bin" >> $GITHUB_PATH

    - name: Cache riscv32 GNU toolchain
      id: riscv32-toolchain-cache
      if: inputs.install-toolchain == 'true'
      uses: actions/cache@v5
      with:
        path: riscv32-toolchain
        key: ${{ runner.os }}-riscv32-glibc-toolchain-2026.05.06

    - name: Install riscv32 GNU toolchain
      shell: bash
      if: inputs.install-toolchain == 'true'
      run: |
        TOOLCHAIN_DIR="$GITHUB_WORKSPACE/riscv32-toolchain"
        if [[ "${{ steps.riscv32-toolchain-cache.outputs.cache-hit }}" != "true" ]]; then
          mkdir -p "$TOOLCHAIN_DIR"
          curl -L "https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/2026.05.06/riscv32-glibc-ubuntu-24.04-gcc.tar.xz" -o /tmp/riscv32-glibc-ubuntu-24.04-gcc.tar.xz
          tar xf /tmp/riscv32-glibc-ubuntu-24.04-gcc.tar.xz --directory="$TOOLCHAIN_DIR" --strip-components=1
        fi
        TOOLCHAIN_BIN=$(find "$TOOLCHAIN_DIR" -type f -name riscv32-unknown-linux-gnu-gcc -printf '%h\n' -quit)
        if [[ -z "$TOOLCHAIN_BIN" ]]; then
          echo "Unable to locate riscv32-unknown-linux-gnu-gcc under $TOOLCHAIN_DIR" >&2
          exit 1
        fi
        echo "$TOOLCHAIN_BIN" >> $GITHUB_PATH

    - name: Install ACT4 Python tooling
      shell: bash
      if: inputs.install-toolchain == 'true'
      run: |
        pipx install --force "uv==0.11.6"
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Check riscv-arch-test dependencies
      shell: bash
      if: inputs.install-toolchain == 'true'
      run: |
        export PATH="$HOME/.local/bin:$GITHUB_WORKSPACE/sail-riscv-0.11/bin:$PATH"
        TOOLCHAIN_BIN=$(find "$GITHUB_WORKSPACE/riscv32-toolchain" -type f -name riscv32-unknown-linux-gnu-gcc -printf '%h\n' -quit)
        export PATH="$TOOLCHAIN_BIN:$PATH"
        sail_riscv_sim --version
        riscv32-unknown-linux-gnu-gcc --version
        riscv32-unknown-linux-gnu-objdump --version
        uv --version
        bundle --version

    - name: Install dependency for NVBoard
      shell: bash
      if: inputs.install-toolchain == 'true'
      run: sudo apt install -y libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev

    - name: Clone other repos
      shell: bash
      run: |
        git config --global user.email "ci@ysyx.org"
        git config --global user.name "ysyx-ci"
        cd $JYD_HOME
        git clone --depth 1 -b master https://github.com/NJU-ProjectN/am-kernels
        cd am-kernels
        git am $JYD_HOME/patch/am-kernels/*
        cd $JYD_HOME

        git clone --depth 1 https://github.com/NJU-ProjectN/rt-thread-am
        cd rt-thread-am
        git am $JYD_HOME/patch/rt-thread-am/*
        cd $JYD_HOME

        git clone --depth 1 https://github.com/NJU-ProjectN/riscv-tests-am

        git clone --depth 1 https://github.com/WangYiJie020/riscv-arch-test-am-jyd


