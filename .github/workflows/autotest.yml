name: Auto-test Workflow

on:
  push:
    branches: [main]
    paths:
      - 'npc/**'
      - 'patch/**'
      - '.github/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      comment:
        description: '注释 (可为空)'
        required: false
        default: ''

run-name: >-
  ${{
    github.event_name == 'push' && github.event.head_commit.message ||
    github.event_name == 'pull_request' && github.event.pull_request.title ||
    github.event.inputs.comment != '' && github.event.inputs.comment ||
    'Manual trigger'
  }}

permissions:
  issues: write

env:
  OSS_CAD_SUITE_RELEASE_TAG: 2025-11-24

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      JYD_HOME:  ${{ steps.set-ysyx-home.outputs.JYD_HOME }}
      VFILE:     ${{ steps.vfilename.outputs.VFILE }}
      DESIGN:    ${{ steps.vfilename.outputs.DESIGN }}
      MAKEFLAGS: ${{ steps.set-env.outputs.MAKEFLAGS }}
    steps:
      - name: Set Git user and email
        run: |
          git config --global user.email "ci@ysyx.org"
          git config --global user.name "ysyx-ci"

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Show current branch
        run: |
          git branch --show-current

      - name: Set JYD_HOME
        id: set-ysyx-home
        run: |
          JYD_HOME=$(pwd)
          echo "JYD_HOME=$JYD_HOME" >> $GITHUB_ENV
          echo "JYD_HOME=$JYD_HOME" >> $GITHUB_OUTPUT

      - name: Set environment variables
        id: set-env
        run: |
          cd $JYD_HOME
          JYD_NEMU_HOME="`pwd`/nemu"
          JYD_AM_HOME="`pwd`/abstract-machine"
          NAVY_HOME="`pwd`/navy-apps"
          JYD_NPC_HOME="`pwd`/npc"
          NVBOARD_HOME="`pwd`/nvboard"

          echo "JYD_NEMU_HOME=$JYD_NEMU_HOME" >> $GITHUB_ENV
          echo "JYD_AM_HOME=$JYD_AM_HOME" >> $GITHUB_ENV
          echo "NAVY_HOME=$NAVY_HOME" >> $GITHUB_ENV
          echo "JYD_NPC_HOME=$JYD_NPC_HOME" >> $GITHUB_ENV
          echo "NVBOARD_HOME=$NVBOARD_HOME" >> $GITHUB_ENV

          MAKEFLAGS="-j`nproc`"
          echo "MAKEFLAGS=$MAKEFLAGS" >> $GITHUB_ENV
          echo "MAKEFLAGS=$MAKEFLAGS" >> $GITHUB_OUTPUT

      - name: Check the version of AM
        run: |
          if [[ ! -e $JYD_AM_HOME/tools/insert-arg.py ]] ; then
            URL="https://github.com/NJU-ProjectN/abstract-machine/commit/c52a41181f8ea5d0e970008e51f58867a3ce65bb"
            echo "$JYD_AM_HOME/tools/insert-arg.py does not exist. Abort."
            echo "You may use AM with the version older than May, 2024."
            echo "Please refer to $URL to apply the patch to AM. After that, the CI flow can insert mainargs to the binary by the python script."
            false
          fi

          sed -i -e 's/MAINARGS_PLACEHOLDER = .*/MAINARGS_PLACEHOLDER = the_insert-arg_rule_in_Makefile_will_insert_mainargs_here/' $JYD_AM_HOME/scripts/platform/npc.mk

      - name: Check patch size
        run: |
          SIZE=`du -sb $JYD_HOME/patch | grep -o '^[0-9]*'`
          SIZE_LIMIT=1048576 # 1MB
          if [[ $SIZE -gt $SIZE_LIMIT ]] ; then
            echo "Patch size($SIZE) is larger than the limit($SIZE_LIMIT)."
            false
          fi

      - name: Setup tools
        run: |
          mkdir -p ~/.local/bin
          MILL_VERSION=0.11.13
          if [[ -e $JYD_HOME/npc/.mill-version ]]; then
            MILL_VERSION=`cat $JYD_HOME/npc/.mill-version`
          fi
          echo "Downloading mill with version $MILL_VERSION"
          sh -c "curl -L https://github.com/com-lihaoyi/mill/releases/download/$MILL_VERSION/$MILL_VERSION > ~/.local/bin/mill && chmod +x ~/.local/bin/mill"

      - name: Clone other repos
        run: |
          cd $JYD_HOME
          git clone --depth 1 -b no-gui https://github.com/NJU-ProjectN/nvboard

      - name: Clean up
        run: |
          make -C $JYD_NEMU_HOME clean
          make -C $JYD_AM_HOME clean-all
          make -C $JYD_NPC_HOME clean

        # TODO: 考虑优化使用 Chisel 的学员生成 verilog 的流程
      - name: Generate verilog for NPC
        run: |
          touch $JYD_NPC_HOME/.timestamp
          make -C $JYD_NPC_HOME verilog

      - name: Check verilog file name
        id: vfilename
        run: |
          VFILE=$(ls $JYD_NPC_HOME/build/*.sv $JYD_NPC_HOME/build/*.v 2>/dev/null | head -1)
          if [[ -z $VFILE ]]; then
            echo "No .sv or .v file found in $JYD_NPC_HOME/build/. Abort."
            false
          fi
          echo "Find $VFILE"

          if [[ $JYD_NPC_HOME/.timestamp -nt $VFILE ]]; then
            echo "$VFILE is older than .timestamp. Abort."
            false
          fi

          DESIGN=$(basename $VFILE | sed 's/\.[^.]*$//')
          echo "VFILE=$VFILE" >> $GITHUB_OUTPUT
          echo "DESIGN=$DESIGN" >> $GITHUB_OUTPUT

      - name: Check verilog clock edge
        run: |
          VFILE=${{ steps.vfilename.outputs.VFILE }}
          if grep "negedge" $VFILE; then
            echo "$VFILE contains negedge. Abort."
            false
          fi

      - name: Upload verilog file
        uses: actions/upload-artifact@v6
        with:
          name: verilog
          path: ${{ steps.vfilename.outputs.VFILE }}

      - name: Pack FPGA sources
        run: |
          make -C $JYD_NPC_HOME pack-fpga

      - name: Upload packed FPGA zip
        uses: actions/upload-artifact@v6
        with:
          name: packed-fpga
          path: ${{ steps.set-ysyx-home.outputs.JYD_HOME }}/npc/build/pack-fpga.zip

      - name: Pack workbench
        run: |
          PARENT=$(dirname $JYD_HOME)
          BASENAME=$(basename $JYD_HOME)
          mkdir -p /tmp/artifact-upload
          cd $PARENT
          tar -czf /tmp/artifact-upload/ysyx-workbench.tar.gz \
            --exclude="$BASENAME/.git" \
            --exclude="$BASENAME/oss-cad-suite" \
            $BASENAME
      - name: Upload workbench
        uses: actions/upload-artifact@v6
        with:
          name: workbench
          path: /tmp/artifact-upload/
          retention-days: 1

  hello:
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Common operations
        uses: ./.github/actions/common
        with:
          JYD_HOME: ${{ needs.setup.outputs.JYD_HOME }}
          MAKEFLAGS: ${{ needs.setup.outputs.MAKEFLAGS }}

      - name: hello
        run: |
          KEY=$(head -c 5 /dev/urandom | base32)
          python $MONITOR_PY --middle="Hello, AbstractMachine!" --good=$KEY make ARCH=riscv32-jyd -C $JYD_HOME/am-kernels/kernels/hello run mainargs=$KEY

  cpu-tests:
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Common operations
        uses: ./.github/actions/common
        with:
          JYD_HOME: ${{ needs.setup.outputs.JYD_HOME }}
          MAKEFLAGS: ${{ needs.setup.outputs.MAKEFLAGS }}

      - name: cpu-tests
        run: |
          make ARCH=riscv32-jyd -C $JYD_HOME/am-kernels/tests/cpu-tests run ALL=dummy
          make ARCH=riscv32-jyd -C $JYD_HOME/am-kernels/tests/cpu-tests run

  jyd-tests:
    needs: setup
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        sample: [src0, src1, src2]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Common operations
        uses: ./.github/actions/common
        with:
          JYD_HOME: ${{ needs.setup.outputs.JYD_HOME }}
          MAKEFLAGS: ${{ needs.setup.outputs.MAKEFLAGS }}

      - name: jyd-tests (${{ matrix.sample }})
        run: |
          make -C $JYD_HOME/jyd-tests run ${{ matrix.sample }}

  riscv-tests:
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Common operations
        uses: ./.github/actions/common
        with:
          JYD_HOME: ${{ needs.setup.outputs.JYD_HOME }}
          MAKEFLAGS: ${{ needs.setup.outputs.MAKEFLAGS }}

      - name: riscv-tests
        run: |
          git clone --depth 1 https://github.com/NJU-ProjectN/riscv-tests-am
          make ARCH=riscv32-jyd -C riscv-tests-am run TEST_ISA=i ALL=auipc
          make ARCH=riscv32-jyd -C riscv-tests-am run TEST_ISA=i

  riscv-arch-test:
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Common operations
        uses: ./.github/actions/common
        with:
          JYD_HOME: ${{ needs.setup.outputs.JYD_HOME }}
          MAKEFLAGS: ${{ needs.setup.outputs.MAKEFLAGS }}

      - name: riscv-arch-test
        run: |
          git clone --depth 1 https://github.com/NJU-ProjectN/riscv-arch-test-am
          make ARCH=riscv32e-npc -C riscv-arch-test-am run TEST_ISA=E ALL=add-01
          make ARCH=riscv32e-npc -C riscv-arch-test-am run TEST_ISA="E Zifencei"

  microbench:
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Common operations
        uses: ./.github/actions/common
        with:
          JYD_HOME: ${{ needs.setup.outputs.JYD_HOME }}
          MAKEFLAGS: ${{ needs.setup.outputs.MAKEFLAGS }}

      - name: microbench
        run: |
          KEY=$(head -c 5 /dev/urandom | base32)
          python $MONITOR_PY --good="$KEY" make ARCH=riscv32-jyd -C $JYD_HOME/am-kernels/benchmarks/microbench run mainargs=$KEY

  rt-thread:
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Common operations
        uses: ./.github/actions/common
        with:
          JYD_HOME: ${{ needs.setup.outputs.JYD_HOME }}
          MAKEFLAGS: ${{ needs.setup.outputs.MAKEFLAGS }}

      - name: Install dependency
        run: sudo apt install -y scons

      - name: rt-thread
        run: |
          cd $JYD_HOME/rt-thread-am/bsp/abstract-machine
          make ARCH=riscv32-jyd init
          KEY=$(head -c 5 /dev/urandom | base32)
          python $MONITOR_PY --good=$KEY make ARCH=riscv32-jyd run

  iverilog-microbench:
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Common operations
        uses: ./.github/actions/common
        with:
          JYD_HOME: ${{ needs.setup.outputs.JYD_HOME }}
          MAKEFLAGS: ${{ needs.setup.outputs.MAKEFLAGS }}

      - name: compile microbench
        run: |
          make ARCH=riscv32e-npc -C $JYD_HOME/am-kernels/benchmarks/microbench mainargs=the_insert-arg_rule_in_Makefile_will_insert_mainargs_here

      - name: run microbench with iverilog
        run: |
          make -C $JYD_NPC_HOME clean
          KEY=$(head -c 5 /dev/urandom | base32)
          IMG=$JYD_HOME/am-kernels/benchmarks/microbench/build/microbench-riscv32e-npc.bin
          python $JYD_AM_HOME/tools/insert-arg.py $IMG 64 the_insert-arg_rule_in_Makefile_will_insert_mainargs_here $KEY
          python $MONITOR_PY --good=$KEY make -C $JYD_NPC_HOME sim-iverilog IMG=$IMG

  vivado-fpga:
    needs: setup
    runs-on: [self-hosted, Windows]
    steps:
      - name: Remove old packed FPGA zip
        shell: pwsh
        run: |
          $packedZip = 'D:\jyd-vivado\pack-fpga.zip'
          if (Test-Path $packedZip) {
            Remove-Item -Path $packedZip -Force
          }

      - name: Download packed FPGA zip
        uses: actions/download-artifact@v8
        with:
          name: packed-fpga
          path: 'D:\jyd-vivado'

      - name: Run Vivado workflow
        shell: pwsh
        run: |
          D:\jyd-vivado\run.ps1

      - name: Pack Vivado result
        shell: pwsh
        run: |
          $resultDir = 'D:\jyd-vivado\result'
          $resultZip = 'D:\jyd-vivado\result.zip'
          if (Test-Path $resultZip) {
            Remove-Item -Path $resultZip -Force
          }
          if (-not (Test-Path $resultDir)) {
            throw "Vivado result directory not found: $resultDir"
          }
          Compress-Archive -Path "$resultDir\*" -DestinationPath $resultZip

      - name: Upload Vivado result zip
        uses: actions/upload-artifact@v6
        with:
          name: vivado-result
          path: 'D:\jyd-vivado\result.zip'

  yosys-sta:
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Common operations
        uses: ./.github/actions/common
        with:
          JYD_HOME: ${{ needs.setup.outputs.JYD_HOME }}
          MAKEFLAGS: ${{ needs.setup.outputs.MAKEFLAGS }}
          install-toolchain: 'false'

      - name: Install dependency
        run: |
          sudo apt install -y libunwind-dev liblzma-dev

      - name: Clone yosys-sta
        run: |
          git clone -b ci https://github.com/OSCPU/yosys-sta
          cd yosys-sta
          make init
          echo exit | ./bin/iEDA -v

      - name: Generate Verilog
        run: |
          make -C $JYD_NPC_HOME verilog

      - name: Set environment variables
        run: |
          echo "VFILE=${{ needs.setup.outputs.VFILE }}" >> $GITHUB_ENV
          echo "DESIGN=${{ needs.setup.outputs.DESIGN }}" >> $GITHUB_ENV

      - name: Run STA
        run: |
          make -C yosys-sta sta DESIGN=$DESIGN CLK_FREQ_MHZ=500 CLK_PORT_NAME=clock RTL_FILES=$VFILE

      - name: Check latch
        run: |
          YOSYS_LOG=yosys-sta/result/$DESIGN-500MHz/synth_stat.txt
          if grep "DLL\|DLH" $YOSYS_LOG ; then
            echo "The design contains latch, which is not allowed."
            false
          fi

      - name: Parse area
        run: |
          YOSYS_LOG=yosys-sta/result/$DESIGN-500MHz/yosys-fixed.log
          AREA=`grep -o "Chip area for module .*: .*" $YOSYS_LOG | sed -e 's/.*: \([0-9]*\.[0-9]*\)$/\1/'`
          if [[ $AREA == "" ]] ; then
            echo "Can not obtain area from yosys-sta. Abort."
            false
          fi
          echo "Area: $AREA"
          echo "AREA=$AREA" >> $GITHUB_ENV

      - name: Upload STA result
        uses: actions/upload-artifact@v6
        with:
          name: sta-result
          path: yosys-sta/result/${{ needs.setup.outputs.DESIGN }}-500MHz

      - name: Upload netlist file
        uses: actions/upload-artifact@v6
        with:
          name: netlist
          path: yosys-sta/result/${{ needs.setup.outputs.DESIGN }}-500MHz/${{ needs.setup.outputs.DESIGN }}.netlist.fixed.v

  iverilog-netlist-microbench:
    needs: [setup, yosys-sta]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Common operations
        uses: ./.github/actions/common
        with:
          JYD_HOME: ${{ needs.setup.outputs.JYD_HOME }}
          MAKEFLAGS: ${{ needs.setup.outputs.MAKEFLAGS }}

      - name: Download verilog file
        uses: actions/download-artifact@v8
        with:
          name: netlist

      - name: Clone yosys-sta
        run: |
          git clone -b ci https://github.com/OSCPU/yosys-sta
          cd yosys-sta
          make init
          echo exit | ./bin/iEDA -v

      - name: compile microbench
        run: |
          make ARCH=riscv32e-npc -C $JYD_HOME/am-kernels/benchmarks/microbench mainargs=the_insert-arg_rule_in_Makefile_will_insert_mainargs_here

      - name: run microbench with iverilog netlist
        run: |
          make -C $JYD_NPC_HOME clean
          NETLIST=`pwd`/${{ needs.setup.outputs.DESIGN }}.netlist.fixed.v
          CELLS=`pwd`/yosys-sta/pdk/nangate45/sim/cells.v
          KEY=$(head -c 5 /dev/urandom | base32)
          IMG=$JYD_HOME/am-kernels/benchmarks/microbench/build/microbench-riscv32e-npc.bin
          python $JYD_AM_HOME/tools/insert-arg.py $IMG 64 the_insert-arg_rule_in_Makefile_will_insert_mainargs_here $KEY
          python $MONITOR_PY --good=$KEY make -C $JYD_NPC_HOME sim-iverilog-netlist IMG=$IMG NETLIST=$NETLIST CELLS=$CELLS
