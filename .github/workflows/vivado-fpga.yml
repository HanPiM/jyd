name: Vivado FPGA Workflow

on:
  push:
    branches: [main]
    paths:
      - 'npc/design/**'
      - 'jyd-tests/2026/coe/**'
      - '.github/workflows/vivado-fpga.yml'
      - '.github/workflows/reusable-setup.yml'
  workflow_dispatch:
    inputs:
      comment:
        description: '注释 (可为空)'
        required: false
        default: ''

run-name: >-
  ${{
    github.event_name == 'push' && github.event.head_commit.message ||
    github.event.inputs.comment != '' && github.event.inputs.comment ||
    'Manual trigger'
  }}

permissions:
  contents: read

concurrency:
  group: vivado-fpga-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    uses: ./.github/workflows/reusable-setup.yml
    secrets: inherit

  vivado-fpga:
    needs: setup
    runs-on: [self-hosted, Linux]
    strategy:
      matrix:
        sample: [src0, src1, src2]
    steps:
      - name: Checkout Vivado project
        uses: actions/checkout@v5
        with:
          repository: WangYiJie020/jyd-vivado-proj
          path: jyd-vivado-proj

      - name: Download packed FPGA zip
        uses: actions/download-artifact@v8
        with:
          name: packed-fpga
          path: artifacts/packed-fpga

      - name: Download COE samples
        uses: actions/download-artifact@v8
        with:
          name: test-coes
          path: artifacts/test-coes

      - name: Run Vivado workflow (${{ matrix.sample }})
        run: |
          ./jyd-vivado-proj/scripts/run-vivado-flow.sh \
            --project-root ./jyd-vivado-proj \
            --pack-zip ./artifacts/packed-fpga/pack-fpga.zip \
            --coe-dir ./artifacts/test-coes \
            --sample '${{ matrix.sample }}' \
            --mode bitstream \
            --result-dir ./vivado-result/${{ matrix.sample }}

      - name: Upload Vivado result
        id: upload-vivado-result
        uses: actions/upload-artifact@v6
        with:
          name: vivado-result-${{ matrix.sample }}
          path: vivado-result/${{ matrix.sample }}

      - name: Add Vivado summary
        run: |
          echo "- \`${{ matrix.sample }}\`: [vivado-result-${{ matrix.sample }}](${{ steps.upload-vivado-result.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"
