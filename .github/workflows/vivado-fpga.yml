name: Vivado FPGA Workflow

on:
  push:
    branches: [main]
    paths:
      - 'npc/design/**'
      - 'jyd-tests/2026/coe/**'
      - '.github/workflows/vivado-fpga.yml'
      - '.github/workflows/reusable-setup.yml'
  workflow_dispatch:
    inputs:
      comment:
        description: '注释 (可为空)'
        required: false
        default: ''

run-name: >-
  ${{
    github.event_name == 'push' && github.event.head_commit.message ||
    github.event.inputs.comment != '' && github.event.inputs.comment ||
    'Manual trigger'
  }}

permissions:
  contents: read

concurrency:
  group: vivado-fpga-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    uses: ./.github/workflows/reusable-setup.yml
    secrets: inherit

  vivado-fpga:
    needs: setup
    runs-on: [self-hosted, Linux]
    strategy:
      matrix:
        fail-fast: false
        sample: [src0, src1, src2]
    steps:
      - name: Checkout Vivado project
        uses: actions/checkout@v5
        with:
          repository: WangYiJie020/jyd-vivado-proj
          path: jyd-vivado-proj

      - name: Download packed FPGA zip
        uses: actions/download-artifact@v8
        with:
          name: packed-fpga
          path: artifacts/packed-fpga

      - name: Download COE samples
        uses: actions/download-artifact@v8
        with:
          name: test-coes
          path: artifacts/test-coes

      - name: Restore Vivado result cache
        id: vivado-result-cache
        uses: actions/cache/restore@v5
        with:
          path: vivado-result/${{ matrix.sample }}
          key: ${{ runner.os }}-vivado-result-${{ matrix.sample }}-${{ hashFiles('jyd-vivado-proj/digital_twin.srcs/**', 'jyd-vivado-proj/digital_twin.tcl', 'jyd-vivado-proj/digital_twin.xpr') }}-${{ needs.setup.outputs.PACK_FPGA_HASH }}

      - name: Update Vivado project (${{ matrix.sample }})
        run: |
          ./jyd-vivado-proj/scripts/run-vivado-project-update.sh \
            --project-root ./jyd-vivado-proj \
            --pack-zip ./artifacts/packed-fpga/pack-fpga.zip \
            --coe-dir ./artifacts/test-coes \
            --sample '${{ matrix.sample }}'

      - name: Archive Vivado project
        run: |
          set -euo pipefail
          mkdir -p vivado-project-artifacts
          zip -qr "vivado-project-artifacts/proj-${{ matrix.sample }}.zip" jyd-vivado-proj -x 'jyd-vivado-proj/.git/*'

      - name: Upload Vivado project
        id: upload-vivado-project
        uses: actions/upload-artifact@v6
        with:
          name: proj-${{ matrix.sample }}.zip
          path: vivado-project-artifacts/proj-${{ matrix.sample }}.zip
          retention-days: 90

      - name: Run Vivado workflow (${{ matrix.sample }})
        if: steps.vivado-result-cache.outputs.cache-hit != 'true'
        run: |
          ./jyd-vivado-proj/scripts/run-vivado-flow.sh \
            --project-root ./jyd-vivado-proj \
            --pack-zip ./artifacts/packed-fpga/pack-fpga.zip \
            --coe-dir ./artifacts/test-coes \
            --sample '${{ matrix.sample }}' \
            --mode bitstream \
            --result-dir ./vivado-result/${{ matrix.sample }} \
            --skip-project-update

      - name: Prepare top.bit
        run: |
          set -euo pipefail
          result_dir="./vivado-result/${{ matrix.sample }}"
          top_bit="$result_dir/top.bit"
          if [ ! -f "$top_bit" ]; then
            mapfile -t bitfiles < <(find "$result_dir" -type f -name '*.bit' | sort)
            if [ "${#bitfiles[@]}" -ne 1 ]; then
              echo "Expected exactly one .bit file in $result_dir, found ${#bitfiles[@]}" >&2
              find "$result_dir" -maxdepth 4 -type f | sort >&2
              exit 1
            fi
            cp "${bitfiles[0]}" "$top_bit"
          fi

      - name: Save Vivado result cache
        if: steps.vivado-result-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: vivado-result/${{ matrix.sample }}
          key: ${{ steps.vivado-result-cache.outputs.cache-primary-key }}

      - name: Upload Vivado result
        id: upload-vivado-result
        uses: actions/upload-artifact@v6
        with:
          name: vivado-result-${{ matrix.sample }}
          path: vivado-result/${{ matrix.sample }}

      - name: Add Vivado summary
        run: |
          {
            echo "## Vivado result (${{ matrix.sample }})"
            echo ""
            echo "- Artifact: [vivado-result-${{ matrix.sample }}](${{ steps.upload-vivado-result.outputs.artifact-url }})"
            echo "- Project: [proj-${{ matrix.sample }}.zip](${{ steps.upload-vivado-project.outputs.artifact-url }})"
            echo ""
            echo "### Timing"
            echo ""
            echo '```text'
            python3 ./jyd-vivado-proj/scripts/extract-timing-summary.py ./vivado-result/${{ matrix.sample }}
            echo '```'
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update FPGA burn submitter
        run: |
          python3 ~/jyd/burn.py update

      - name: Run FPGA burn test
        id: burn-test
        run: |
          set +e
          python3 ~/jyd/burn.py ./vivado-result/${{ matrix.sample }}/top.bit > burn-result-${{ matrix.sample }}.json
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Add FPGA burn summary
        if: always()
        run: |
          python3 ./jyd-vivado-proj/scripts/format-burn-summary.py burn-result-${{ matrix.sample }}.json --sample '${{ matrix.sample }}' >> "$GITHUB_STEP_SUMMARY"
          exit "${{ steps.burn-test.outputs.status || 1 }}"
